name: RVX Patcher

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Download Tools
        run: |
          # Descarga de CLI (con tu fallback v6.0.0)
          CLI_URL=$(curl -s https://api.github.com/repos/inotia00/revanced-cli/releases/latest | jq -r '.assets[] | select(.name | endswith("all.jar")) | .browser_download_url' | head -n 1)
          if [ -z "$CLI_URL" ] || [ "$CLI_URL" == "null" ]; then
            CLI_URL="https://github.com/ReVanced/revanced-cli/releases/download/v6.0.0/revanced-cli-6.0.0-all.jar"
          fi
          wget -qO cli.jar "$CLI_URL"

          # Descarga de Patches e Integrations
          wget -qO patches.jar $(curl -s https://api.github.com/repos/inotia00/revanced-patches/releases/latest | jq -r '.assets[] | select(.name | endswith(".jar")) | .browser_download_url' | head -n 1)
          wget -qO integrations.apk $(curl -s https://api.github.com/repos/inotia00/revanced-integrations/releases/latest | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)

      - name: Download GPhotos Base
        run: |
          # Obtener versión soportada y descargar APK
          SUGGESTED_VER=$(java -jar cli.jar list-versions -p patches.jar | grep -A 1 "com.google.android.apps.photos" | grep "Version:" | awk '{print $2}' | tail -n 1)
          echo "Versión compatible detectada: $SUGGESTED_VER"
          wget -qO gphotos-base.apk "https://github.com/XDream8/revanced-creator/releases/download/deps/com.google.android.apps.photos_${SUGGESTED_VER}.apk"

      - name: Run Patch
        run: |
          java -jar cli.jar patch \
            -b gphotos-base.apk \
            -p patches.jar \
            -m integrations.apk \
            --pkg app.revanced.gphotos \
            -i "GmsCore support" \
            -o gphotos-rvx-unsigned.apk

      - name: Sign APK
        run: |
          wget -q https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar
          java -jar uber-apk-signer-1.3.0.jar --apks gphotos-rvx-unsigned.apk --out ./output

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Google Photos RVX (app.revanced.gphotos)
          files: ./output/*-aligned-debugSigned.apk
          
