name: GPhotos RVX Auto-Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Download Tools (with Fallback)
        run: |
          # Función para obtener el asset correcto de GitHub
          get_asset() {
            repo=$1
            regex=$2
            fallback=$3
            url=$(curl -s "https://api.github.com/repos/$repo/releases/latest" | jq -r ".assets[] | select(.name | test(\"$regex\")) | .browser_download_url" | head -n 1)
            if [ -z "$url" ] || [ "$url" == "null" ]; then
              wget -O "$4" "$fallback"
            else
              wget -O "$4" "$url"
            fi
          }

          # CLI: Intentar dinámico, si falla usar tu v6.0.0
          get_asset "inotia00/revanced-cli" "all\\.jar$" "https://github.com/ReVanced/revanced-cli/releases/download/v6.0.0/revanced-cli-6.0.0-all.jar" "cli.jar"
          
          # Patches e Integrations (RVX inotia00)
          get_asset "inotia00/revanced-patches" "\\.jar$" "" "patches.jar"
          get_asset "inotia00/revanced-integrations" "\\.apk$" "" "integrations.apk"

      - name: Auto-Download GPhotos Base
        run: |
          # Obtener la versión sugerida por los patches
          SUGGESTED_VER=$(java -jar cli.jar list-versions -p patches.jar | grep -A 1 "com.google.android.apps.photos" | grep "Version:" | awk '{print $2}' | tail -n 1)
          echo "Buscando APK para versión: $SUGGESTED_VER"
          
          # Descarga desde un repositorio de confianza de la comunidad (XDream8 o similar)
          wget -O gphotos-base.apk "https://github.com/XDream8/revanced-creator/releases/download/deps/com.google.android.apps.photos_${SUGGESTED_VER}.apk" || \
          wget -O gphotos-base.apk "https://github.com/architsharma10/gphotos-rvx/releases/download/base/gphotos-base.apk"

      - name: Patch Application
        run: |
          java -jar cli.jar patch \
            -b gphotos-base.apk \
            -p patches.jar \
            -m integrations.apk \
            --pkg app.revanced.gphotos \
            -i "GmsCore support" \
            -o gphotos-rvx-unsigned.apk

      - name: Sign APK (For Obtainium/Non-Root)
        run: |
          wget https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar
          java -jar uber-apk-signer-1.3.0.jar --apks gphotos-rvx-unsigned.apk --out ./output

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rvx-${{ github.run_number }}
          name: Google Photos RVX (Non-Root)
          files: ./output/*-aligned-debugSigned.apk
